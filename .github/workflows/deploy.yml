name: Deploy domse.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: domse-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, domse-dev]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site
        run: |
          set -euo pipefail
          rsync -a --delete --omit-dir-times \
            --exclude .git \
            --exclude .github \
            "$GITHUB_WORKSPACE/" /srv/domse-dev-site/
          printf '%s' "$GITHUB_SHA" > /srv/domse-dev-site/.deployed-revision
