<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https://upload.wikimedia.org https://tile.openstreetmap.org; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'self'">
  <title>Domse E-Bike & Trail Magazin — Hameln & Weserbergland</title>
  <meta name="description" content="Das persönliche E-MTB und E-Bike Tourenmagazin und Trail-Archiv für Domse rund um Hameln, Klüt, Süntel, Ith und Deister.">
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css?release=20260719-map3">
  <link rel="stylesheet" href="style.css?release=20260719-gallery1">
</head>
<body>

  <!-- Header (Rule 11: Logo leads to /, Main Nav ONLY E-Bike and Sport) -->
  <header class="app-header">
    <div class="header-inner">
      <a href="/" class="brand-logo" id="logoLink" title="Zur domse.dev Startseite" aria-label="Zur domse.dev Startseite">
        <div class="logo-symbol">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <span>DOMSE<span class="brand-dot">.</span>TRAIL</span>
      </a>

      <nav class="main-navigation">
        <a href="#/ebike" class="nav-link active" id="navEbike">
          <span>E-Bike</span>
        </a>
        <a href="#/sport" class="nav-link" id="navSport">
          <span>Sport & Log</span>
        </a>
      </nav>

      <div class="header-actions">
        <button class="action-pill-btn" id="btnOpenCompare" title="Ausgewählte Touren vergleichen" aria-label="Ausgewählte Touren vergleichen">
          <svg class="icon-sm" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm9.707 5.707a1 1 0 00-1.414-1.414L9 12.586l-1.293-1.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
          <span>Vergleich</span>
          <span class="pill-count" id="compareCountPill">0</span>
        </button>
        <button class="action-pill-btn" id="btnFilterFavs" title="Gespeicherte Favoriten anzeigen" aria-label="Gespeicherte Favoriten anzeigen">
          <svg class="icon-sm" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
          <span>Favoriten</span>
          <span class="pill-count" id="favCountPill">0</span>
        </button>
        <button class="theme-toggle-btn" id="btnToggleTheme" title="Zwischen Tagestour (Hell) und Alpenglow (Dunkel) wechseln" aria-label="Farbschema wechseln">
          <svg class="icon-theme" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Dynamic Application Content Container -->
  <main class="main-content" id="appMain">
    <!-- Content injected dynamically by app.js based on route hash -->
  </main>

  <!-- Mobile One-Hand Bottom Dock (Rule 7) -->
  <nav class="mobile-bottom-dock" id="mobileDock">
    <button class="dock-btn active" data-target="spontan">
      <svg class="dock-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span>Spontan</span>
    </button>
    <button class="dock-btn" data-target="ebike">
      <svg class="dock-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span>Touren</span>
    </button>
    <button class="dock-btn" data-target="compare">
      <svg class="dock-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Vergleich</span>
    </button>
    <button class="dock-btn" data-target="sport">
      <svg class="dock-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span>Logbuch</span>
    </button>
  </nav>

  <!-- Tour Comparison Modal Overlay -->
  <div class="modal-overlay" id="compareModalOverlay">
    <div class="modal-window">
      <div class="modal-header">
        <h3 class="modal-title">Direktvergleich ausgewählter Touren</h3>
        <button class="btn-close-modal" id="btnCloseCompare">✕</button>
      </div>
      <div class="compare-content" id="compareContentContainer">
        <!-- Comparison grid loaded dynamically -->
      </div>
    </div>
  </div>

  <!-- Full-screen gallery viewer with mouse, keyboard and touch zoom. -->
  <div class="image-viewer-overlay" id="imageViewerOverlay" role="dialog" aria-modal="true" aria-labelledby="imageViewerTitle" aria-hidden="true" tabindex="-1">
    <div class="image-viewer-shell">
      <header class="image-viewer-header">
        <div class="image-viewer-heading">
          <span class="image-viewer-eyebrow" id="imageViewerCounter">Bild</span>
          <h2 id="imageViewerTitle">Tourenbild</h2>
          <p class="image-viewer-attribution">Foto: <span id="imageViewerArtist">Urheber</span> · <a id="imageViewerLicense" target="_blank" rel="noopener noreferrer">Lizenz</a> · <a id="imageViewerSource" target="_blank" rel="noopener noreferrer">Commons</a></p>
        </div>
        <button class="image-viewer-control image-viewer-close" id="btnImageViewerClose" type="button" aria-label="Bildansicht schließen">✕</button>
      </header>

      <div class="image-viewer-stage" id="imageViewerStage" data-zoom="1.00" data-pan-x="0" data-pan-y="0">
        <button class="image-viewer-nav image-viewer-prev" id="btnImageViewerPrev" type="button" aria-label="Vorheriges Bild">‹</button>
        <div class="image-viewer-canvas">
          <img id="imageViewerImage" alt="" draggable="false">
        </div>
        <button class="image-viewer-nav image-viewer-next" id="btnImageViewerNext" type="button" aria-label="Nächstes Bild">›</button>
      </div>

      <footer class="image-viewer-toolbar" aria-label="Bildzoom">
        <button class="image-viewer-control" id="btnImageZoomOut" type="button" aria-label="Bild verkleinern">−</button>
        <output id="imageViewerZoom" aria-live="polite">100 %</output>
        <button class="image-viewer-control" id="btnImageZoomIn" type="button" aria-label="Bild vergrößern">+</button>
        <button class="image-viewer-reset" id="btnImageZoomReset" type="button">Einpassen</button>
        <span class="image-viewer-help">Scrollen, ziehen oder mit zwei Fingern zoomen</span>
      </footer>
    </div>
  </div>

  <script src="js/security.js"></script>
  <script src="vendor/leaflet/leaflet.js?release=20260719-map3"></script>
  <script src="js/svgMapEngine.js?release=20260719-visualfix2"></script>
  <script src="js/scoringAndBattery.js"></script>
  <script src="js/storageAndLog.js"></script>
  <script src="app.js?release=20260719-gallery1"></script>
</body>
</html>
